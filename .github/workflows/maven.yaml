name: Java CI with Maven & JaCoCo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oravel'
          cache: 'maven'

      - name: Build, Test and Check Coverage
        # Dùng lệnh verify để kích hoạt luật check của JaCoCo
        run: mvn clean verify

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        # Sử dụng if: always() để đảm bảo report luôn được upload ngay cả khi build fail do coverage < 80%
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/